name: 🚀 DesktopAutoClicker 云端打包
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      # 1️⃣ 检出代码（带详细日志）
      - name: 📥 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2️⃣ 设置Python环境（显式指定版本）
      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3️⃣ 安装依赖（关键修复：显式安装OpenCV+验证）
      - name: ⚙️ 安装依赖（含OpenCV验证）
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller==6.3.0
          pip install pyautogui==0.9.53 pillow==10.2.0 keyboard==0.13.5
          pip install opencv-python-headless==4.9.0.80
          python -c "import cv2; print(f'✅ OpenCV版本: {cv2.__version__}')"
        shell: pwsh

      # 4️⃣ 验证文件存在（防路径错误）
      - name: 🔍 验证主程序文件
        run: |
          if (-Not (Test-Path "auto_clicker.py")) {
            Write-Error "❌ 错误：auto_clicker.py 不存在！请检查文件名"
            exit 1
          }
          Write-Host "✅ 找到 auto_clicker.py" -ForegroundColor Green
        shell: pwsh

      # 5️⃣ 打包（简化参数+详细日志）
      - name: 📦 PyInstaller 打包
        run: |
          pyinstaller --clean --onefile --windowed --noupx ^
            --collect-all=cv2 ^
            --name="DesktopAutoClicker" ^
            --log-level=DEBUG ^
            auto_clicker.py
        shell: pwsh

      # 6️⃣ 上传到Release（自动创建下载链接）
      - name: 📤 上传到Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: dist/DesktopAutoClicker.exe
          tag_name: v1.0-${{ github.sha }}
          name: DesktopAutoClicker v1.0 (云端构建)
          body: |
            ✅ 云端纯净环境打包｜无DLL冲突｜杀毒误报率低
            📌 使用说明：
            1. 下载 DesktopAutoClicker.exe
            2. 首次运行若弹安全警告：点"更多信息"→"仍要运行"
            3. 按F6开始 / F7停止
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
